<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<!--
  Quiet Tarot — Content pipeline
  Shows: JSON sources → cardContent.ts → screens, plus cards.ts and i18n separation
  Generated March 2026
-->
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray .th { fill: #444441; } .gray .ts { fill: #5F5E5A; }
  .purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .purple .th { fill: #3C3489; } .purple .ts { fill: #534AB7; }
  .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .teal .th { fill: #085041; } .teal .ts { fill: #0F6E56; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  line.arr { marker-end: url(#arrow); }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle">Content pipeline: from JSON to screen</text>
<text class="th" x="340" y="60" text-anchor="middle">Source files (src/data/content/)</text>

<g class="teal"><rect x="40" y="74" width="116" height="56" rx="8" stroke-width="0.5"/><text class="th" x="98" y="94" text-anchor="middle" dominant-baseline="central">major-arcana</text><text class="ts" x="98" y="112" text-anchor="middle" dominant-baseline="central">22 cards</text></g>
<g class="teal"><rect x="166" y="74" width="80" height="56" rx="8" stroke-width="0.5"/><text class="th" x="206" y="94" text-anchor="middle" dominant-baseline="central">wands</text><text class="ts" x="206" y="112" text-anchor="middle" dominant-baseline="central">14 cards</text></g>
<g class="teal"><rect x="256" y="74" width="70" height="56" rx="8" stroke-width="0.5"/><text class="th" x="291" y="94" text-anchor="middle" dominant-baseline="central">cups</text><text class="ts" x="291" y="112" text-anchor="middle" dominant-baseline="central">14 cards</text></g>
<g class="teal"><rect x="336" y="74" width="80" height="56" rx="8" stroke-width="0.5"/><text class="th" x="376" y="94" text-anchor="middle" dominant-baseline="central">swords</text><text class="ts" x="376" y="112" text-anchor="middle" dominant-baseline="central">14 cards</text></g>
<g class="teal"><rect x="426" y="74" width="100" height="56" rx="8" stroke-width="0.5"/><text class="th" x="476" y="94" text-anchor="middle" dominant-baseline="central">pentacles</text><text class="ts" x="476" y="112" text-anchor="middle" dominant-baseline="central">14 cards</text></g>
<g class="purple"><rect x="540" y="74" width="110" height="56" rx="8" stroke-width="0.5"/><text class="th" x="595" y="94" text-anchor="middle" dominant-baseline="central">glossary</text><text class="ts" x="595" y="112" text-anchor="middle" dominant-baseline="central">Keyword defs</text></g>

<line x1="290" y1="130" x2="290" y2="158" class="arr" marker-end="url(#arrow)"/>

<g class="gray"><rect x="60" y="160" width="460" height="80" rx="8" stroke-width="0.5"/><text class="th" x="290" y="182" text-anchor="middle" dominant-baseline="central">Each card JSON contains (upright + reversed):</text><text class="ts" x="290" y="200" text-anchor="middle" dominant-baseline="central">essence · keywords[] · meaning (2¶) · description · insights (5 areas)</text><text class="ts" x="290" y="218" text-anchor="middle" dominant-baseline="central">+ symbols[] with coordinates · focalPoint for circular crop</text></g>

<line x1="290" y1="240" x2="290" y2="270" class="arr" marker-end="url(#arrow)"/>

<g class="purple"><rect x="120" y="272" width="340" height="56" rx="8" stroke-width="0.5"/><text class="th" x="290" y="292" text-anchor="middle" dominant-baseline="central">cardContent.ts</text><text class="ts" x="290" y="310" text-anchor="middle" dominant-baseline="central">Merges 5 JSONs → single Record&lt;id, CardContentData&gt;</text></g>

<line x1="595" y1="130" x2="595" y2="290" stroke="#534AB7" stroke-width="1" fill="none"/>
<line x1="595" y1="290" x2="462" y2="290" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="530" y="282" text-anchor="middle">keyword → definition</text>

<line x1="290" y1="328" x2="290" y2="360" class="arr" marker-end="url(#arrow)"/>

<g class="purple"><rect x="60" y="362" width="460" height="56" rx="8" stroke-width="0.5"/><text class="th" x="290" y="382" text-anchor="middle" dominant-baseline="central">Exported functions</text><text class="ts" x="290" y="400" text-anchor="middle" dominant-baseline="central">getCardContent(id) · getKeywordsWithDefinitions(id, orientation)</text></g>

<line x1="40" y1="436" x2="640" y2="436" class="leader"/>
<text class="th" x="340" y="460" text-anchor="middle">Card definitions + images (separate from content)</text>

<g class="teal"><rect x="40" y="476" width="280" height="76" rx="8" stroke-width="0.5"/><text class="th" x="180" y="498" text-anchor="middle" dominant-baseline="central">cards.ts</text><text class="ts" x="180" y="516" text-anchor="middle" dominant-baseline="central">78 Card objects: id, name, arcana, suit</text><text class="ts" x="180" y="534" text-anchor="middle" dominant-baseline="central">cardImages registry (webp requires)</text></g>
<g class="teal"><rect x="360" y="476" width="280" height="76" rx="8" stroke-width="0.5"/><text class="th" x="500" y="498" text-anchor="middle" dominant-baseline="central">Draw logic</text><text class="ts" x="500" y="516" text-anchor="middle" dominant-baseline="central">drawCard() · drawUniqueCards(n)</text><text class="ts" x="500" y="534" text-anchor="middle" dominant-baseline="central">rollOrientation() → 12% reversed</text></g>

<line x1="40" y1="570" x2="640" y2="570" class="leader"/>
<text class="th" x="340" y="594" text-anchor="middle">UI strings (separate from card content)</text>

<g class="gray"><rect x="60" y="608" width="560" height="56" rx="8" stroke-width="0.5"/><text class="ts" x="340" y="628" text-anchor="middle" dominant-baseline="central">src/i18n/en.json → strings.ts (typed wrapper with t() interpolation)</text><text class="ts" x="340" y="646" text-anchor="middle" dominant-baseline="central">Buttons, labels, headings, error messages. Card content does NOT live here.</text></g>
</svg>