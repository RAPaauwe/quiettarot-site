<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<!--
  Quiet Tarot — Daily draw lifecycle
  Shows: useDailyDraw hook, midnight rollover, foreground detection, draw flag, journal flow
  Generated March 2026
-->
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray .th { fill: #444441; } .gray .ts { fill: #5F5E5A; }
  .purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .purple .th { fill: #3C3489; } .purple .ts { fill: #534AB7; }
  .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .teal .th { fill: #085041; } .teal .ts { fill: #0F6E56; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  line.arr { marker-end: url(#arrow); }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle">Daily draw lifecycle (useDailyDraw)</text>

<g class="gray"><rect x="220" y="44" width="240" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="66" text-anchor="middle" dominant-baseline="central">TodayScreen mounts</text></g>
<line x1="340" y1="88" x2="340" y2="116" class="arr" marker-end="url(#arrow)"/>

<g class="purple"><rect x="160" y="118" width="360" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">loadDraws()</text><text class="ts" x="340" y="156" text-anchor="middle" dominant-baseline="central">Parallel: getDailyDraws() + getTodaysDraw() + hasDrawnToday()</text></g>

<line x1="240" y1="174" x2="140" y2="210" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="174" x2="540" y2="210" class="arr" marker-end="url(#arrow)"/>

<g class="teal"><rect x="40" y="212" width="200" height="76" rx="8" stroke-width="0.5"/><text class="th" x="140" y="234" text-anchor="middle" dominant-baseline="central">Midnight timer</text><text class="ts" x="140" y="252" text-anchor="middle" dominant-baseline="central">getMsUntilMidnight()</text><text class="ts" x="140" y="270" text-anchor="middle" dominant-baseline="central">On fire: reset todaysDraw</text></g>

<g class="teal"><rect x="440" y="212" width="200" height="76" rx="8" stroke-width="0.5"/><text class="th" x="540" y="234" text-anchor="middle" dominant-baseline="central">Foreground listener</text><text class="ts" x="540" y="252" text-anchor="middle" dominant-baseline="central">AppState → 'active'</text><text class="ts" x="540" y="270" text-anchor="middle" dominant-baseline="central">If day changed: reload</text></g>

<text class="ts" x="140" y="304" text-anchor="middle">↻ re-schedules itself</text>

<line x1="40" y1="326" x2="640" y2="326" class="leader"/>
<text class="th" x="340" y="350" text-anchor="middle">Draw flow</text>

<g class="gray"><rect x="130" y="364" width="420" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="384" text-anchor="middle" dominant-baseline="central">canDrawToday?</text><text class="ts" x="340" y="402" text-anchor="middle" dominant-baseline="central">todaysDraw === null AND drawnTodayFlag === false</text></g>

<text class="ts" x="340" y="436" text-anchor="middle">Flag survives "delete all data" — prevents gaming by resetting</text>
<line x1="340" y1="446" x2="340" y2="470" class="arr" marker-end="url(#arrow)"/>

<g class="purple"><rect x="100" y="472" width="480" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="492" text-anchor="middle" dominant-baseline="central">addDraw(cardId, type, orientation)</text><text class="ts" x="340" y="510" text-anchor="middle" dominant-baseline="central">cards.ts drawCard() → rollOrientation(12%) → build DailyDraw</text></g>

<line x1="340" y1="528" x2="340" y2="554" class="arr" marker-end="url(#arrow)"/>

<g class="teal"><rect x="80" y="556" width="520" height="76" rx="8" stroke-width="0.5"/><text class="th" x="340" y="578" text-anchor="middle" dominant-baseline="central">Persist + side effects</text><text class="ts" x="340" y="596" text-anchor="middle" dominant-baseline="central">saveDailyDraw() → AsyncStorage  ·  setDailyDrawFlag() → preserved key</text><text class="ts" x="340" y="614" text-anchor="middle" dominant-baseline="central">trackEvent('cardDrawn')  ·  checkReviewAfterDraw()  ·  scheduleBackup()</text></g>

<line x1="40" y1="650" x2="640" y2="650" class="leader"/>
<text class="th" x="340" y="674" text-anchor="middle">After draw: journal flow</text>

<g class="gray"><rect x="60" y="688" width="560" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="340" y="702" text-anchor="middle" dominant-baseline="central">User taps "reflect" → JournalFlowScreen (modal) → resonance → focus → reflection → updateJournalFlow()</text></g>
</svg>