<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiet Tarot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@200;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #231C2C;
      color: #ECEAF0;
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      padding: 48px 24px;
      text-align: center;
    }
    .wordmark {
      font-family: 'Spectral', serif;
      font-size: 40px;
      margin-bottom: 12px;
    }
    .wordmark-quiet { font-weight: 200; }
    .wordmark-tarot { font-weight: 500; }
    .tagline {
      color: #9C92AB;
      font-size: 18px;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 32px;
      justify-content: center;
      font-size: 15px;
    }
    a { color: #a079d9; text-decoration: none; }
    a:hover { color: #c1a9e3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">
      <span class="wordmark-quiet">quiet</span><span class="wordmark-tarot">Tarot</span>
    </div>
    <p class="tagline">Tarot without the noise.</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
    </div>
  </div>
</body>
</html>
