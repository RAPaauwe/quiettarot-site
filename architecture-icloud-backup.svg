<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<!--
  Quiet Tarot — iCloud backup lifecycle
  Shows: init (4 cases), sync gate, debounce, conflict resolution
  Generated March 2026
-->
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray .th { fill: #444441; } .gray .ts { fill: #5F5E5A; }
  .purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .purple .th { fill: #3C3489; } .purple .ts { fill: #534AB7; }
  .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .teal .th { fill: #085041; } .teal .ts { fill: #0F6E56; }
  .coral rect { fill: #FAECE7; stroke: #993C1D; }
  .coral .th { fill: #712B13; } .coral .ts { fill: #993C1D; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  line.arr { marker-end: url(#arrow); }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle">iCloud backup lifecycle</text>

<g class="gray"><rect x="250" y="44" width="180" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="66" text-anchor="middle" dominant-baseline="central">App launch</text></g>
<line x1="340" y1="88" x2="340" y2="116" class="arr" marker-end="url(#arrow)"/>

<g class="purple"><rect x="220" y="118" width="240" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">initICloudBackup()</text></g>

<line x1="340" y1="162" x2="340" y2="190" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="348" y="180" text-anchor="start">synchronize(), check local + cloud</text>

<g class="gray"><rect x="140" y="196" width="400" height="34" rx="6" stroke-width="0.5"/><text class="ts" x="340" y="213" text-anchor="middle" dominant-baseline="central">Which state? Check hasCloud + hasLocal</text></g>

<line x1="180" y1="230" x2="180" y2="270" class="arr" marker-end="url(#arrow)"/>
<g class="teal"><rect x="80" y="272" width="200" height="56" rx="8" stroke-width="0.5"/><text class="th" x="180" y="292" text-anchor="middle" dominant-baseline="central">Case 1: restore</text><text class="ts" x="180" y="310" text-anchor="middle" dominant-baseline="central">Cloud ✓ Local ✗ → restore</text></g>

<line x1="340" y1="230" x2="340" y2="270" class="arr" marker-end="url(#arrow)"/>
<g class="teal"><rect x="290" y="272" width="200" height="56" rx="8" stroke-width="0.5"/><text class="th" x="390" y="292" text-anchor="middle" dominant-baseline="central">Case 2: local wins</text><text class="ts" x="390" y="310" text-anchor="middle" dominant-baseline="central">Cloud ✓ Local ✓ → keep local</text></g>

<line x1="500" y1="230" x2="500" y2="270" class="arr" marker-end="url(#arrow)"/>
<g class="teal"><rect x="500" y="272" width="160" height="56" rx="8" stroke-width="0.5"/><text class="th" x="580" y="292" text-anchor="middle" dominant-baseline="central">Case 3: fresh</text><text class="ts" x="580" y="310" text-anchor="middle" dominant-baseline="central">Cloud ✗ Local ✗</text></g>

<line x1="180" y1="328" x2="180" y2="356" stroke="#0F6E56" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="390" y1="328" x2="340" y2="356" stroke="#0F6E56" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="580" y1="328" x2="500" y2="356" stroke="#0F6E56" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<g class="teal"><rect x="130" y="358" width="420" height="36" rx="8" stroke-width="0.5"/><text class="th" x="340" y="376" text-anchor="middle" dominant-baseline="central">enableBackups() → sync gate opens → return 'restored' | 'empty'</text></g>

<text class="th" x="340" y="424" text-anchor="middle">Case 4: local ✓ cloud ✗ (slow iCloud?)</text>

<g class="coral"><rect x="120" y="438" width="200" height="56" rx="8" stroke-width="0.5"/><text class="th" x="220" y="458" text-anchor="middle" dominant-baseline="central">Grace period</text><text class="ts" x="220" y="476" text-anchor="middle" dominant-baseline="central">30s timer + listener</text></g>

<line x1="160" y1="494" x2="160" y2="534" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="168" y="520" text-anchor="start">timer expires</text>

<g class="teal"><rect x="60" y="536" width="200" height="44" rx="8" stroke-width="0.5"/><text class="th" x="160" y="558" text-anchor="middle" dominant-baseline="central">enableBackups()</text></g>
<text class="ts" x="160" y="596" text-anchor="middle">Cloud truly empty, proceed</text>

<line x1="280" y1="494" x2="460" y2="534" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="400" y="518" text-anchor="end">iCloud data arrives late</text>

<g class="coral"><rect x="360" y="536" width="240" height="56" rx="8" stroke-width="0.5"/><text class="th" x="480" y="556" text-anchor="middle" dominant-baseline="central">Conflict detected</text><text class="ts" x="480" y="574" text-anchor="middle" dominant-baseline="central">Both local + cloud have data</text></g>

<line x1="420" y1="592" x2="320" y2="634" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="592" x2="540" y2="634" class="arr" marker-end="url(#arrow)"/>

<g class="purple"><rect x="210" y="636" width="210" height="44" rx="8" stroke-width="0.5"/><text class="th" x="315" y="658" text-anchor="middle" dominant-baseline="central">forceRestoreFromICloud()</text></g>
<text class="ts" x="315" y="696" text-anchor="middle">User picks "restore"</text>

<g class="purple"><rect x="450" y="636" width="190" height="44" rx="8" stroke-width="0.5"/><text class="th" x="545" y="658" text-anchor="middle" dominant-baseline="central">forceLocalToICloud()</text></g>
<text class="ts" x="545" y="696" text-anchor="middle">User picks "start fresh"</text>

<text class="th" x="340" y="732" text-anchor="middle">Runtime: writes trigger backup</text>
<g class="gray"><rect x="40" y="746" width="600" height="56" rx="8" stroke-width="0.5"/><text class="ts" x="340" y="766" text-anchor="middle" dominant-baseline="central">storage.ts write → scheduleBackup(key) → 2s debounce → flushBackups() → iCloud KV</text><text class="ts" x="340" y="784" text-anchor="middle" dominant-baseline="central">Also: flushBackups() on app background  ·  2-year retention cap on draws/spreads</text></g>
</svg>