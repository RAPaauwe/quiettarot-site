<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<!--
  Quiet Tarot — Premium gating map
  Shows: RevenueCat → PremiumContext → per-tab gates → component gates
  Generated March 2026
-->
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray .th { fill: #444441; } .gray .ts { fill: #5F5E5A; }
  .purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .purple .th { fill: #3C3489; } .purple .ts { fill: #534AB7; }
  .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .teal .th { fill: #085041; } .teal .ts { fill: #0F6E56; }
  .coral rect { fill: #FAECE7; stroke: #993C1D; }
  .coral .th { fill: #712B13; } .coral .ts { fill: #993C1D; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  line.arr { marker-end: url(#arrow); }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle">Premium gating map</text>

<g class="gray"><rect x="40" y="44" width="160" height="44" rx="8" stroke-width="0.5"/><text class="th" x="120" y="60" text-anchor="middle" dominant-baseline="central">RevenueCat</text><text class="ts" x="120" y="76" text-anchor="middle" dominant-baseline="central">€6.99/year annual</text></g>
<line x1="200" y1="66" x2="258" y2="66" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="260" y="44" width="200" height="44" rx="8" stroke-width="0.5"/><text class="th" x="360" y="60" text-anchor="middle" dominant-baseline="central">PremiumContext</text><text class="ts" x="360" y="76" text-anchor="middle" dominant-baseline="central">isPremium · purchase · restore</text></g>
<line x1="460" y1="66" x2="498" y2="66" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="500" y="44" width="140" height="44" rx="8" stroke-width="0.5"/><text class="th" x="570" y="60" text-anchor="middle" dominant-baseline="central">usePremium()</text><text class="ts" x="570" y="76" text-anchor="middle" dominant-baseline="central">Hook for screens</text></g>

<line x1="40" y1="106" x2="640" y2="106" class="leader"/>
<text class="th" x="340" y="130" text-anchor="middle">Per-tab gates</text>

<g class="teal"><rect x="40" y="148" width="290" height="100" rx="10" stroke-width="0.5"/><text class="th" x="185" y="170" text-anchor="middle" dominant-baseline="central">Today</text></g>
<g class="teal"><rect x="56" y="182" width="120" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="116" y="196" text-anchor="middle" dominant-baseline="central">1 draw/day</text></g>
<g class="teal"><rect x="186" y="182" width="130" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="251" y="196" text-anchor="middle" dominant-baseline="central">Journal entry</text></g>
<text class="ts" x="56" y="236" text-anchor="start">All free. No premium gates.</text>

<g class="coral"><rect x="350" y="148" width="290" height="100" rx="10" stroke-width="0.5"/><text class="th" x="495" y="170" text-anchor="middle" dominant-baseline="central">Readings</text></g>
<g class="teal"><rect x="366" y="182" width="110" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="421" y="196" text-anchor="middle" dominant-baseline="central">3 free/week</text></g>
<g class="coral"><rect x="486" y="182" width="140" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="556" y="196" text-anchor="middle" dominant-baseline="central">Unlimited (Quiet+)</text></g>
<text class="ts" x="366" y="236" text-anchor="start">Weekly limit via useWeeklyReadingLimit</text>

<g class="teal"><rect x="40" y="268" width="290" height="100" rx="10" stroke-width="0.5"/><text class="th" x="185" y="290" text-anchor="middle" dominant-baseline="central">Library</text></g>
<g class="teal"><rect x="56" y="302" width="120" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="116" y="316" text-anchor="middle" dominant-baseline="central">78-card grid</text></g>
<g class="teal"><rect x="186" y="302" width="130" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="251" y="316" text-anchor="middle" dominant-baseline="central">Meanings</text></g>
<text class="ts" x="56" y="356" text-anchor="start">Browse + meanings free. Insights gated.</text>

<g class="coral"><rect x="350" y="268" width="290" height="100" rx="10" stroke-width="0.5"/><text class="th" x="495" y="290" text-anchor="middle" dominant-baseline="central">Journal</text></g>
<g class="teal"><rect x="366" y="302" width="110" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="421" y="316" text-anchor="middle" dominant-baseline="central">Last 7 days</text></g>
<g class="coral"><rect x="486" y="302" width="140" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="556" y="316" text-anchor="middle" dominant-baseline="central">Full history (Quiet+)</text></g>
<text class="ts" x="366" y="356" text-anchor="start">Locked months show lock icon (8–30 days)</text>

<line x1="40" y1="386" x2="640" y2="386" class="leader"/>
<text class="th" x="340" y="410" text-anchor="middle">Component-level gates</text>

<g class="coral"><rect x="40" y="424" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="180" y="444" text-anchor="middle" dominant-baseline="central">InsightTabs</text><text class="ts" x="180" y="462" text-anchor="middle" dominant-baseline="central">5 area tabs locked → upgrade CTA</text></g>
<g class="gray"><rect x="360" y="424" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="500" y="444" text-anchor="middle" dominant-baseline="central">UpgradeScreen</text><text class="ts" x="500" y="462" text-anchor="middle" dominant-baseline="central">Paywall: USPs + purchase button</text></g>
<text class="ts" x="180" y="498" text-anchor="middle">Used in CardDetail + reading screens</text>
<text class="ts" x="500" y="498" text-anchor="middle">Navigated to when hitting any gate</text>

<line x1="40" y1="518" x2="640" y2="518" class="leader"/>
<text class="th" x="340" y="542" text-anchor="middle">Dev mode override</text>
<g class="gray"><rect x="80" y="556" width="520" height="68" rx="8" stroke-width="0.5"/><text class="ts" x="340" y="576" text-anchor="middle" dominant-baseline="central">DevContext.isPremium toggle in Settings (dev builds only)</text><text class="ts" x="340" y="594" text-anchor="middle" dominant-baseline="central">effectiveIsPremium = devIsPremium || realIsPremium</text><text class="ts" x="340" y="612" text-anchor="middle" dominant-baseline="central">Separate from real purchase — both paths coexist for testing</text></g>
</svg>