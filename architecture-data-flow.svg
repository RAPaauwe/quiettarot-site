<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
<!--
  Quiet Tarot — Data flow diagram
  Shows: storage → data access → hooks → screens → UI system → external services
  Generated March 2026
-->
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray .th { fill: #444441; }
  .gray .ts { fill: #5F5E5A; }
  .purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .purple .th { fill: #3C3489; }
  .purple .ts { fill: #534AB7; }
  .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .teal .th { fill: #085041; }
  .teal .ts { fill: #0F6E56; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  line.arr { marker-end: url(#arrow); }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- === TOP ROW: On-device storage === -->
<text class="th" x="340" y="30" text-anchor="middle">On-device storage</text>

<g class="teal">
  <rect x="40" y="46" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="66" text-anchor="middle" dominant-baseline="central">Content JSONs</text>
  <text class="ts" x="130" y="84" text-anchor="middle" dominant-baseline="central">5 suit files + glossary</text>
</g>

<g class="teal">
  <rect x="250" y="46" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="66" text-anchor="middle" dominant-baseline="central">AsyncStorage</text>
  <text class="ts" x="340" y="84" text-anchor="middle" dominant-baseline="central">Draws, spreads, profile</text>
</g>

<g class="teal">
  <rect x="460" y="46" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="66" text-anchor="middle" dominant-baseline="central">Card images</text>
  <text class="ts" x="550" y="84" text-anchor="middle" dominant-baseline="central">78 webp + 2 backs</text>
</g>

<line x1="130" y1="102" x2="130" y2="148" class="arr"/>
<line x1="340" y1="102" x2="340" y2="148" class="arr"/>
<line x1="550" y1="102" x2="550" y2="148" class="arr"/>

<!-- === ROW 2: Data access layer === -->
<text class="th" x="340" y="142" text-anchor="middle">Data access layer</text>

<g class="purple">
  <rect x="40" y="154" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="174" text-anchor="middle" dominant-baseline="central">cardContent.ts</text>
  <text class="ts" x="130" y="192" text-anchor="middle" dominant-baseline="central">Loads + resolves content</text>
</g>

<g class="purple">
  <rect x="250" y="154" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="174" text-anchor="middle" dominant-baseline="central">storage.ts</text>
  <text class="ts" x="340" y="192" text-anchor="middle" dominant-baseline="central">Read/write wrappers</text>
</g>

<g class="purple">
  <rect x="460" y="154" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="174" text-anchor="middle" dominant-baseline="central">cards.ts</text>
  <text class="ts" x="550" y="192" text-anchor="middle" dominant-baseline="central">78 defs + draw logic</text>
</g>

<line x1="130" y1="210" x2="200" y2="264" class="arr"/>
<line x1="340" y1="210" x2="340" y2="264" class="arr"/>
<line x1="550" y1="210" x2="480" y2="264" class="arr"/>

<!-- === ROW 3: Hooks === -->
<text class="th" x="340" y="258" text-anchor="middle">Hooks</text>

<g class="purple">
  <rect x="120" y="270" width="160" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="292" text-anchor="middle" dominant-baseline="central">useDailyDraw</text>
</g>

<g class="purple">
  <rect x="310" y="270" width="170" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="395" y="292" text-anchor="middle" dominant-baseline="central">useSpreadReading</text>
</g>

<g class="purple">
  <rect x="510" y="270" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="292" text-anchor="middle" dominant-baseline="central">useJournalEntries</text>
</g>

<line x1="200" y1="314" x2="200" y2="366" class="arr"/>
<line x1="395" y1="314" x2="395" y2="366" class="arr"/>
<line x1="580" y1="314" x2="540" y2="366" class="arr"/>

<!-- === ROW 4: Screens === -->
<text class="th" x="340" y="360" text-anchor="middle">Screens</text>

<g class="gray">
  <rect x="80" y="372" width="520" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="394" text-anchor="middle" dominant-baseline="central">Today  ·  Readings  ·  Library  ·  Journal  ·  Settings</text>
</g>

<line x1="340" y1="416" x2="340" y2="458" class="arr"/>
<text class="ts" x="348" y="440" text-anchor="start">render with</text>

<!-- === ROW 5: UI system === -->
<text class="th" x="340" y="454" text-anchor="middle">UI system</text>

<g class="teal">
  <rect x="40" y="466" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="486" text-anchor="middle" dominant-baseline="central">tokens.ts</text>
  <text class="ts" x="110" y="504" text-anchor="middle" dominant-baseline="central">Palette, spacing, type</text>
</g>

<g class="teal">
  <rect x="200" y="466" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="270" y="486" text-anchor="middle" dominant-baseline="central">useColors()</text>
  <text class="ts" x="270" y="504" text-anchor="middle" dominant-baseline="central">Semantic color hook</text>
</g>

<g class="teal">
  <rect x="360" y="466" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="486" text-anchor="middle" dominant-baseline="central">Typography</text>
  <text class="ts" x="430" y="504" text-anchor="middle" dominant-baseline="central">7 text components</text>
</g>

<g class="teal">
  <rect x="520" y="466" width="130" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="585" y="486" text-anchor="middle" dominant-baseline="central">responsive.ts</text>
  <text class="ts" x="585" y="504" text-anchor="middle" dominant-baseline="central">moderateScale()</text>
</g>

<line x1="180" y1="494" x2="198" y2="494" class="arr"/>
<line x1="340" y1="494" x2="358" y2="494" class="arr"/>

<!-- === ROW 6: External services === -->
<text class="th" x="340" y="558" text-anchor="middle">External services</text>

<g class="gray">
  <rect x="60" y="570" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="140" y="590" text-anchor="middle" dominant-baseline="central">RevenueCat</text>
  <text class="ts" x="140" y="608" text-anchor="middle" dominant-baseline="central">Subscriptions</text>
</g>

<g class="gray">
  <rect x="260" y="570" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="590" text-anchor="middle" dominant-baseline="central">TelemetryDeck</text>
  <text class="ts" x="340" y="608" text-anchor="middle" dominant-baseline="central">Opt-in analytics</text>
</g>

<g class="gray">
  <rect x="460" y="570" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="590" text-anchor="middle" dominant-baseline="central">iCloud KV Store</text>
  <text class="ts" x="550" y="608" text-anchor="middle" dominant-baseline="central">Full data mirror</text>
</g>

<line class="leader" x1="140" y1="570" x2="140" y2="538"/>
<text class="ts" x="148" y="548" text-anchor="start">→ PremiumContext</text>

<line class="leader" x1="340" y1="570" x2="340" y2="538"/>
<text class="ts" x="348" y="548" text-anchor="start">→ useAnalytics</text>

<line class="leader" x1="550" y1="570" x2="550" y2="538"/>
<text class="ts" x="558" y="548" text-anchor="start">↔ AsyncStorage</text>

<!-- iCloud detail note -->
<g class="gray">
  <rect x="40" y="644" width="600" height="44" rx="6" stroke-width="0.5"/>
  <text class="ts" x="340" y="660" text-anchor="middle" dominant-baseline="central">iCloud mirrors: draws, spreads, weekly focus, profile, reading limits</text>
  <text class="ts" x="340" y="676" text-anchor="middle" dominant-baseline="central">AsyncStorage is source of truth · iCloud restores on empty device · debounced push on write</text>
</g>
</svg>