<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<!--
  Quiet Tarot — App shell diagram
  Shows containment: App.tsx → Providers → Splash → Navigation → Tab stacks
  Generated March 2026
-->
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray .th { fill: #444441; }
  .gray .ts { fill: #5F5E5A; }
  .purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .purple .th { fill: #3C3489; }
  .purple .ts { fill: #534AB7; }
  .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .teal .th { fill: #085041; }
  .teal .ts { fill: #0F6E56; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  line.arr { marker-end: url(#arrow); }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- App.tsx outermost container -->
<g class="gray">
  <rect x="30" y="20" width="620" height="600" rx="20" stroke-width="0.5"/>
  <text class="th" x="340" y="48" text-anchor="middle">App.tsx</text>
  <text class="ts" x="340" y="66" text-anchor="middle">Root: splash gate → providers → navigation</text>
</g>

<!-- Providers band -->
<g class="purple">
  <rect x="55" y="86" width="570" height="52" rx="10" stroke-width="0.5"/>
</g>
<g class="purple"><rect x="70" y="94" width="110" height="28" rx="14" stroke-width="0.5"/><text class="ts" x="125" y="108" text-anchor="middle" dominant-baseline="central">ThemeContext</text></g>
<g class="purple"><rect x="190" y="94" width="124" height="28" rx="14" stroke-width="0.5"/><text class="ts" x="252" y="108" text-anchor="middle" dominant-baseline="central">PremiumContext</text></g>
<g class="purple"><rect x="324" y="94" width="100" height="28" rx="14" stroke-width="0.5"/><text class="ts" x="374" y="108" text-anchor="middle" dominant-baseline="central">DevContext</text></g>
<g class="purple"><rect x="434" y="94" width="140" height="28" rx="14" stroke-width="0.5"/><text class="ts" x="504" y="108" text-anchor="middle" dominant-baseline="central">WeeklyFocusCtx</text></g>

<!-- AnimatedSplash -->
<g class="gray">
  <rect x="55" y="152" width="570" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="340" y="169" text-anchor="middle" dominant-baseline="central">AnimatedSplash → gates on asset preload, then fades out</text>
</g>

<!-- Onboarding gate -->
<line x1="340" y1="186" x2="340" y2="204" class="arr"/>
<text class="ts" x="408" y="198" text-anchor="start">hasCompletedOnboarding?</text>

<!-- Onboarding path -->
<g class="purple">
  <rect x="55" y="210" width="180" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="145" y="232" text-anchor="middle" dominant-baseline="central">Onboarding flow</text>
</g>
<text class="ts" x="145" y="270" text-anchor="middle">5 steps → sets flag → main</text>

<!-- Main tabs container -->
<g class="purple">
  <rect x="260" y="210" width="365" height="390" rx="14" stroke-width="0.5"/>
  <text class="th" x="442" y="236" text-anchor="middle">Main (tab navigator)</text>
  <text class="ts" x="442" y="254" text-anchor="middle">Floating blur tab bar</text>
</g>

<!-- Four tab stacks -->
<g class="teal">
  <rect x="278" y="272" width="154" height="136" rx="8" stroke-width="0.5"/>
  <text class="th" x="355" y="294" text-anchor="middle" dominant-baseline="central">Today</text>
  <text class="ts" x="355" y="314" text-anchor="middle" dominant-baseline="central">TodaySheetScreen</text>
  <text class="ts" x="355" y="332" text-anchor="middle" dominant-baseline="central">JournalEntryDetail</text>
  <text class="ts" x="355" y="350" text-anchor="middle" dominant-baseline="central">Settings · About</text>
  <text class="ts" x="355" y="368" text-anchor="middle" dominant-baseline="central">Content</text>
</g>

<g class="teal">
  <rect x="452" y="272" width="154" height="136" rx="8" stroke-width="0.5"/>
  <text class="th" x="529" y="294" text-anchor="middle" dominant-baseline="central">Readings</text>
  <text class="ts" x="529" y="314" text-anchor="middle" dominant-baseline="central">ReadingsScreen</text>
  <text class="ts" x="529" y="332" text-anchor="middle" dominant-baseline="central">Single / 3-card spread</text>
  <text class="ts" x="529" y="350" text-anchor="middle" dominant-baseline="central">JournalEntryDetail</text>
  <text class="ts" x="529" y="368" text-anchor="middle" dominant-baseline="central">Settings · About · Content</text>
</g>

<g class="teal">
  <rect x="278" y="422" width="154" height="116" rx="8" stroke-width="0.5"/>
  <text class="th" x="355" y="444" text-anchor="middle" dominant-baseline="central">Library</text>
  <text class="ts" x="355" y="464" text-anchor="middle" dominant-baseline="central">LibraryScreen</text>
  <text class="ts" x="355" y="482" text-anchor="middle" dominant-baseline="central">CardDetailScreen</text>
  <text class="ts" x="355" y="500" text-anchor="middle" dominant-baseline="central">Settings · About · Content</text>
</g>

<g class="teal">
  <rect x="452" y="422" width="154" height="116" rx="8" stroke-width="0.5"/>
  <text class="th" x="529" y="444" text-anchor="middle" dominant-baseline="central">Journal</text>
  <text class="ts" x="529" y="464" text-anchor="middle" dominant-baseline="central">JournalScreen</text>
  <text class="ts" x="529" y="482" text-anchor="middle" dominant-baseline="central">JournalEntryDetail</text>
  <text class="ts" x="529" y="500" text-anchor="middle" dominant-baseline="central">Settings · About · Content</text>
</g>

<!-- Modal flows -->
<g class="purple">
  <rect x="278" y="554" width="154" height="32" rx="8" stroke-width="0.5"/>
  <text class="ts" x="355" y="570" text-anchor="middle" dominant-baseline="central">JournalFlow (modal)</text>
</g>
<g class="purple">
  <rect x="452" y="554" width="154" height="32" rx="8" stroke-width="0.5"/>
  <text class="ts" x="529" y="570" text-anchor="middle" dominant-baseline="central">WeeklyFocus (modal)</text>
</g>
</svg>